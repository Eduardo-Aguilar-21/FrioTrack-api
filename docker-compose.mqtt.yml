services:
  friotrack-mqtt:
    image: eclipse-mosquitto:2
    container_name: friotrack-mqtt
    restart: unless-stopped
    ports:
      - "127.0.0.1:1885:1883"
    volumes:
      - ./docker/mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mqtt/data:/mosquitto/data
    networks:
      - friotrack-mqtt-net

networks:
  friotrack-mqtt-net:
    name: friotrack-mqtt-net
