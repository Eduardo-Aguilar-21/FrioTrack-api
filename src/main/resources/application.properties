spring.application.name=friotrackapi

# MQTT ingestion
friotrack.mqtt.enabled=${FRIOTRACK_MQTT_ENABLED:true}
friotrack.mqtt.host=${FRIOTRACK_MQTT_HOST:127.0.0.1}
friotrack.mqtt.port=${FRIOTRACK_MQTT_PORT:1885}
friotrack.mqtt.username=${FRIOTRACK_MQTT_USERNAME:friotrack_device}
friotrack.mqtt.password=${FRIOTRACK_MQTT_PASSWORD:}
friotrack.mqtt.topic=${FRIOTRACK_MQTT_TOPIC:vehiculo/+}
friotrack.mqtt.client-id=${FRIOTRACK_MQTT_CLIENT_ID:friotrack-api-subscriber}
# Authentication
friotrack.auth.jwt-secret=${FRIOTRACK_JWT_SECRET:friotrack-dev-secret-change-me}
friotrack.auth.jwt-expiration-seconds=${FRIOTRACK_JWT_EXPIRATION_SECONDS:28800}

# PostgreSQL persistence
friotrack.persistence.mode=${FRIOTRACK_PERSISTENCE_MODE:db}
spring.datasource.url=${FRIOTRACK_DB_URL:jdbc:postgresql://127.0.0.1:5544/friotrack}
spring.datasource.username=${FRIOTRACK_DB_USERNAME:friotrack}
spring.datasource.password=${FRIOTRACK_DB_PASSWORD:friotrack_dev}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# Traccar ingestion
friotrack.traccar.enabled=${FRIOTRACK_TRACCAR_ENABLED:false}
friotrack.traccar.url=${FRIOTRACK_TRACCAR_URL:http://127.0.0.1:8082}
friotrack.traccar.email=${FRIOTRACK_TRACCAR_EMAIL:}
friotrack.traccar.password=${FRIOTRACK_TRACCAR_PASSWORD:}
friotrack.traccar.reconnect-delay-ms=${FRIOTRACK_TRACCAR_RECONNECT_DELAY_MS:5000}

# Materialization and retention
friotrack.trips.materialize-delay-ms=${FRIOTRACK_TRIPS_MATERIALIZE_DELAY_MS:60000}
friotrack.trips.materialize-initial-delay-ms=${FRIOTRACK_TRIPS_MATERIALIZE_INITIAL_DELAY_MS:30000}
friotrack.retention.telemetry-days=${FRIOTRACK_RETENTION_TELEMETRY_DAYS:180}
friotrack.retention.events-days=${FRIOTRACK_RETENTION_EVENTS_DAYS:365}
friotrack.retention.push-days=${FRIOTRACK_RETENTION_PUSH_DAYS:180}
friotrack.retention.trips-days=${FRIOTRACK_RETENTION_TRIPS_DAYS:730}
friotrack.retention.cron=${FRIOTRACK_RETENTION_CRON:0 20 3 * * *}

# Expo push
friotrack.expo.access-token=${FRIOTRACK_EXPO_ACCESS_TOKEN:}
friotrack.expo.receipt-delay-ms=${FRIOTRACK_EXPO_RECEIPT_DELAY_MS:60000}
friotrack.expo.receipt-initial-delay-ms=${FRIOTRACK_EXPO_RECEIPT_INITIAL_DELAY_MS:60000}
friotrack.expo.retry-delay-ms=${FRIOTRACK_EXPO_RETRY_DELAY_MS:300000}
friotrack.expo.retry-initial-delay-ms=${FRIOTRACK_EXPO_RETRY_INITIAL_DELAY_MS:120000}
