spring.application.name=friotrackapi

# Temporary in-memory demo mode. Remove these exclusions when PostgreSQL persistence is enabled.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration

# MQTT ingestion
friotrack.mqtt.enabled=${FRIOTRACK_MQTT_ENABLED:true}
friotrack.mqtt.host=${FRIOTRACK_MQTT_HOST:127.0.0.1}
friotrack.mqtt.port=${FRIOTRACK_MQTT_PORT:1885}
friotrack.mqtt.username=${FRIOTRACK_MQTT_USERNAME:friotrack_device}
friotrack.mqtt.password=${FRIOTRACK_MQTT_PASSWORD:}
friotrack.mqtt.topic=${FRIOTRACK_MQTT_TOPIC:vehiculo/+}
friotrack.mqtt.client-id=${FRIOTRACK_MQTT_CLIENT_ID:friotrack-api-subscriber}
