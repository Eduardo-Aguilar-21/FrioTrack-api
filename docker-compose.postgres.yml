services:
  friotrack-postgres:
    image: postgres:16-alpine
    container_name: friotrack-postgres
    restart: unless-stopped
    env_file:
      - .env.postgres
    environment:
      POSTGRES_DB: friotrack
      POSTGRES_USER: friotrack
    ports:
      - "127.0.0.1:5544:5432"
    volumes:
      - friotrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friotrack -d friotrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  friotrack-postgres-data:
